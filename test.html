<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Character Profile</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<main class="screen">
  <div class="app">

    <div class="app-header">
      <div>
        <h1>Character Profile</h1>
        <p class="muted">Loaded from your saved character</p>
      </div>

      <div>
        <a href="index.html" class="secondary-button">← Back</a>
        <button class="primary-button" onclick="window.print()">Print</button>
      </div>
    </div>

    <section class="panel">
      <div id="profile"></div>
      <div id="inventory"></div>
    </section>

  </div>
</main>

<script>
const statNames = ["Strength", "Dexterity", "Constitution", "Intelligence", "Wisdom", "Charisma"];

function modifier(score) {
  const val = Math.floor((Number(score || 8) - 10) / 2);
  return val >= 0 ? "+" + val : val;
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function loadCharacter() {
  const saved = localStorage.getItem("tabletopCharacter");
  if (!saved) return null;

  try {
    return JSON.parse(saved);
  } catch {
    return null;
  }
}

function saveCharacter(character) {
  localStorage.setItem("tabletopCharacter", JSON.stringify(character));
}

function render() {
  const character = loadCharacter();
  const container = document.getElementById("profile");

  if (!character) {
    container.innerHTML = `
      <div class="warning-card over">
        <h2>No Character Found</h2>
        <p>Create and save a character first.</p>
      </div>
    `;
    return;
  }

  const stats = character.stats || {};
  const gear = character.gear?.selected || "None";
  const starter = character.starterPokemon || "";

  if (!Array.isArray(character.pokemonParty)) {
    character.pokemonParty = [starter, "", "", "", "", ""];
  }

  while (character.pokemonParty.length < 6) {
    character.pokemonParty.push("");
  }

  character.pokemonParty = character.pokemonParty.slice(0, 6);

  if (starter && !character.pokemonParty[0]) {
    character.pokemonParty[0] = starter;
  }

  saveCharacter(character);

  container.innerHTML = `
    <div class="sheet-box">

      <div class="character-header-row">
        <div class="character-name-block">
          <h2>${escapeHtml(character.name) || "Unnamed Character"}</h2>
          <p class="muted">Level ${character.level || 1} ${escapeHtml(character.className)}</p>
        </div>

        <div class="pokemon-party">
          ${character.pokemonParty.map(pokemon => `
            <div class="pokemon-ball-slot" title="${pokemon ? escapeHtml(pokemon) : "Empty Slot"}">
              <img src="ballclose.png" class="pokemon-ball-img" alt="${pokemon ? escapeHtml(pokemon) : "Empty Slot"}">
              <span class="pokemon-ball-name">${pokemon ? escapeHtml(pokemon) : ""}</span>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="sheet-stats">
        ${statNames.map(stat => `
          <div class="stat-card">
            <p class="muted">${stat}</p>
            <div class="score">${stats[stat] || 8}</div>
            <div class="mod">${modifier(stats[stat] || 8)}</div>
          </div>
        `).join("")}
      </div>

      <div class="sheet-info-grid">
        <div class="info-card">
          <h3>Background</h3>
          <p><strong class="muted">Alignment:</strong> ${escapeHtml(character.alignment) || "Not set"}</p>
          <p><strong class="muted">Faith:</strong> ${escapeHtml(character.faith) || "Not set"}</p>
          <p><strong class="muted">Personality:</strong><br>${escapeHtml(character.personality) || "Not set"}</p>
          <p><strong class="muted">Physical:</strong><br>${escapeHtml(character.physical) || "Not set"}</p>
        </div>

        <div class="info-card">
          <h3>Starting Gear</h3>
          <ul>
            <li>${escapeHtml(gear)}</li>
          </ul>

          <h3>Notes</h3>
          <p>${escapeHtml(character.notes) || "No notes added."}</p>
        </div>
      </div>

    </div>
  `;
}

render();
</script>

<script src="inventory.js"></script>
</body>
</html>
