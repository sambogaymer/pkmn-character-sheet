<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabletop Character Creator</title>

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- START SCREEN -->
  <main id="welcome" class="screen center-screen">
    <section class="welcome-card">
      <div class="crest">📜</div>
      <h1>Tabletop Character Creator</h1>
      <p class="muted">
      </p>

      <button class="start-button" onclick="startCreator()">
        Create Character
      </button>
    </section>
  </main>

  <!-- CHARACTER CREATOR -->
  <main id="creator" class="screen" style="display:none;">
    <div class="app">

      <header class="app-header">
        <div>
          <h1>Create Character</h1>
          <p id="stepCounter" class="muted">
            Step 1 of 4: Class
          </p>
        </div>
      </header>

      <section class="panel">

        <div class="step-title">
          <div class="step-icon" id="stepIcon">⚔️</div>
          <h2 id="stepTitle">Class</h2>
        </div>

        <div id="stepContent"></div>

      </section>

      <footer class="footer-nav">
        <button
          class="secondary-button"
          id="backButton"
          onclick="prevStep()"
        >
          ← Back
        </button>

        <button
          class="primary-button"
          id="nextButton"
          onclick="nextStep()"
        >
          Next →
        </button>
      </footer>

    </div>
  </main>

  <!-- JAVASCRIPT FILE -->
  <script src="creator.js"></script>

</body>
</html>
