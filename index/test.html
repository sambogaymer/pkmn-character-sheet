<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Character Profile</title>

  <!-- Use same styling -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="screen">
  <div class="app">

    <div class="app-header">
      <div>
        <h1>Character Profile</h1>
        <p class="muted">Loaded from your saved character</p>
      </div>

      <div>
        <a href="index.html" class="secondary-button">← Back</a>
        <button class="primary-button" onclick="window.print()">Print</button>
      </div>
    </div>

    <section class="panel">

  <!-- Character Sheet -->
  <div id="profile"></div>

  <!-- Inventory (goes UNDER the sheet) -->
  <div id="inventory" style="margin-top: 20px;"></div>

	</section>

  </div>
</main>

<script>

const statNames = ["Strength","Dexterity","Constitution","Intelligence","Wisdom","Charisma"];

function modifier(score){
  const val = Math.floor((score - 10)/2);
  return val >= 0 ? "+" + val : val;
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function loadCharacter(){
  const saved = localStorage.getItem("tabletopCharacter");
  if(!saved) return null;

  try{
    return JSON.parse(saved);
  }catch{
    return null;
  }
}

function render(){
  const character = loadCharacter();
  const container = document.getElementById("profile");

  if(!character){
    container.innerHTML = `
      <div class="warning-card over">
        <h2>No Character Found</h2>
        <p>Create and save a character first.</p>
      </div>
    `;
    return;
  }

  const stats = character.stats || {};
  const gear = character.gear?.selected || "None";

  container.innerHTML = `
    <div class="sheet-box">

      <div class="sheet-header">
        <div>
          <h2>${escapeHtml(character.name) || "Unnamed Character"}</h2>
          <p class="muted">
            Level ${character.level || 1} ${escapeHtml(character.className)}
          </p>
        </div>
      </div>

      <div class="grid grid-3 sheet-stats">
        ${statNames.map(stat => `
          <div class="stat-card">
            <p class="muted">${stat}</p>
            <div class="score">${stats[stat]}</div>
            <div class="mod">${modifier(stats[stat])}</div>
          </div>
        `).join("")}
      </div>

      <div class="grid grid-2">

        <div class="info-card">
          <h3>Background</h3>
          <p><strong class="muted">Alignment:</strong> ${escapeHtml(character.alignment) || "Not set"}</p>
          <p><strong class="muted">Faith:</strong> ${escapeHtml(character.faith) || "Not set"}</p>

          <p><strong class="muted">Personality:</strong><br>
          ${escapeHtml(character.personality) || "Not set"}</p>

          <p><strong class="muted">Physical:</strong><br>
          ${escapeHtml(character.physical) || "Not set"}</p>
        </div>

        <div class="info-card">
          <h3>Starting Gear</h3>
          <ul>
            <li>${escapeHtml(gear)}</li>
          </ul>

          <h3 style="margin-top:15px;">Notes</h3>
          <p>${escapeHtml(character.notes) || "No notes added."}</p>
        </div>

      </div>

    </div>
	
	
  `;
}

render();

</script>

<script>
  render();  <!-- your existing character render -->
</script>

<script src="inventory.js"></script>

</body>
</html>
